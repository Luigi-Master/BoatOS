<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚢 BoatOS v4.0 (Real v86 Emulation)</title>
  <script src="https://unpkg.com/v86@0.0.3/libv86.js"></script>
  <style>
    :root {
      --bg: #0a1929; --taskbar: #071422; --accent: #4da6ff; --win-bg: #132a42; 
      --win-border: #1e4a7a; --text: #e6f1ff; --text-muted: #8ab4d9;
      --danger: #ff6b6b; --success: #51cf66;
    }
    * { box-sizing: border-box; outline: none; }
    body, html { 
      margin:0; padding:0; height:100%; overflow:hidden; 
      font-family:'Segoe UI',system-ui,sans-serif; 
      background:linear-gradient(135deg,#0a1929,#132a42,#1e4a7a); 
      color:var(--text); 
      /* FIX: Allow text selection everywhere by default */
      user-select: text; 
    }
    
    /* UI Elements - No Selection */
    #desktop, #taskbar, .window-header, .tb-item, .icon, .menu-item { user-select: none; }
    
    /* Inputs - Force Focus */
    input, textarea, select, button { user-select: text !important; }
    input:focus, textarea:focus { border-color: var(--accent); }

    #desktop { position:relative; width:100%; height:100%; }
    #desktop-icons { position:absolute; top:20px; left:20px; display:flex; flex-direction:column; gap:12px; z-index:10; }
    .icon { width:70px; padding:6px; border-radius:8px; cursor:pointer; text-align:center; transition:0.2s; }
    .icon:hover { background:rgba(77,166,255,0.15); }
    .icon-img { width:40px; height:40px; background:var(--win-bg); border:2px solid var(--win-border); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:20px; margin:0 auto 4px; }
    .icon-label { font-size:11px; color:var(--text); text-shadow:0 1px 2px rgba(0,0,0,0.5); }
    
    #taskbar { position:fixed; bottom:0; left:0; width:100%; height:45px; background:var(--taskbar); border-top:1px solid var(--win-border); display:flex; align-items:center; padding:0 10px; z-index:9999; box-shadow:0 -4px 10px rgba(0,0,0,0.3); }
    #start-btn { background:var(--accent); color:#071422; border:none; padding:5px 14px; border-radius:5px; font-weight:600; cursor:pointer; font-size:12px; }
    #taskbar-apps { flex:1; display:flex; gap:4px; margin-left:10px; overflow-x:auto; padding:2px 0; scrollbar-width:none; }
    .tb-item { background:var(--win-bg); padding:4px 8px; border-radius:4px; cursor:pointer; font-size:10px; display:flex; align-items:center; gap:4px; border:1px solid transparent; max-width:130px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tb-item.active { background:var(--accent); color:#071422; }
    #clock { margin-left:auto; font-size:11px; color:var(--text-muted); padding:4px 8px; background:rgba(19,42,66,0.5); border-radius:4px; }
    
    #start-menu { position:fixed; bottom:50px; left:10px; width:220px; background:var(--win-bg); border:1px solid var(--win-border); border-radius:6px; padding:6px; display:none; z-index:10000; box-shadow:0 5px 20px rgba(0,0,0,0.4); max-height:60vh; overflow-y:auto; }
    #start-menu.show { display:block; }
    .menu-item { padding:6px 8px; border-radius:4px; cursor:pointer; font-size:12px; display:flex; align-items:center; gap:6px; margin-bottom:2px; }
    .menu-item:hover { background:#1e4a7a; }
    .menu-sec { margin-top:4px; padding-top:4px; border-top:1px solid var(--win-border); }
    .menu-title { font-size:9px; color:var(--text-muted); text-transform:uppercase; padding:2px 6px; margin-bottom:2px; }
    
    .window { position:absolute; background:var(--win-bg); border:1px solid var(--win-border); border-radius:6px; box-shadow:0 4px 15px rgba(0,0,0,0.3); display:flex; flex-direction:column; min-width:250px; min-height:150px; overflow:hidden; }
    .win-header { background:#0d2136; padding:6px 8px; display:flex; align-items:center; justify-content:space-between; cursor:grab; border-bottom:1px solid var(--win-border); height:30px; }
    .win-header:active { cursor:grabbing; }
    .win-title { font-size:11px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; margin-right:4px; }
    .win-ctrls { display:flex; gap:4px; }
    .win-btn { width:10px; height:10px; border-radius:2px; border:none; cursor:pointer; font-size:9px; line-height:1; display:flex; align-items:center; justify-content:center; color:#fff; }
    .close { background:var(--danger); } .min { background:var(--text-muted); } .max { background:var(--success); }
    .win-content { flex:1; overflow:hidden; display:flex; flex-direction:column; position:relative; }
    .resize-handle { position:absolute; bottom:0; right:0; width:10px; height:10px; cursor:nwse-resize; z-index:2; }
    
    /* Glass overlay to fix iframe drag stealing */
    #glass-overlay { position:fixed; top:0; left:0; width:100%; height:100%; z-index:9998; display:none; cursor:inherit; pointer-events: none; }

    /* App Styles */
    .browser-toolbar { display:flex; gap:4px; padding:4px; background:#0d2136; border-bottom:1px solid var(--win-border); align-items:center; }
    .b-btn { background:#1e4a7a; border:none; color:var(--text); width:22px; height:22px; border-radius:3px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px; }
    .b-btn:hover { background:var(--accent); color:#071422; }
    .b-btn:disabled { opacity:0.4; cursor:default; background:#132a42; }
    .url-bar { flex:1; min-width:100px; background:#071422; border:1px solid var(--win-border); border-radius:3px; padding:3px 6px; color:var(--text); font-size:11px; }
    .browser-frame { flex:1; border:none; background:#fff; }
    .b-placeholder { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:12px; text-align:center; color:var(--text-muted); background:#0d2136; }
    .q-link { background:#1e4a7a; padding:3px 6px; border-radius:3px; font-size:10px; cursor:pointer; margin:2px; }
    .status { padding:3px 6px; background:#071422; border-top:1px solid var(--win-border); font-size:9px; color:var(--text-muted); display:flex; justify-content:space-between; }
    
    .terminal { flex:1; background:#0c1421; color:#00ff9d; font-family:monospace; font-size:11px; padding:6px; overflow-y:auto; display:flex; flex-direction:column; }
    .t-out { flex:1; white-space:pre-wrap; margin-bottom:2px; }
    .t-in-line { display:flex; gap:4px; align-items:center; }
    .t-prompt { color:var(--accent); font-weight:bold; }
    .t-input { flex:1; background:transparent; border:none; color:#00ff9d; font-family:inherit; font-size:inherit; }
    
    .calc-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; padding:6px; height:100%; background:#0d2136; }
    .calc-disp { grid-column:span 4; background:#071422; padding:8px; font-size:18px; text-align:right; border-radius:4px; border:1px solid var(--win-border); }
    .calc-btn { background:#1e4a7a; border:none; color:var(--text); border-radius:4px; font-size:12px; cursor:pointer; padding:6px; }
    .calc-btn:hover { background:var(--accent); color:#071422; }
    
    .linux-container { flex:1; display:flex; flex-direction:column; background:#000; }
    .linux-canvas { flex:1; width:100%; background:#000; display:block; image-rendering:pixelated; }
    .linux-controls { padding:6px; background:#111; display:flex; gap:6px; align-items:center; border-top:1px solid #333; }
    .linux-btn { background:#333; color:#fff; border:1px solid #555; padding:4px 8px; font-size:10px; cursor:pointer; border-radius:3px; }
    .linux-btn:hover { background:#444; }
    #iso-upload { display:none; }
    
    .about-box { padding:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; }
    .about-box h2 { color:var(--accent); margin:0 0 6px 0; font-size:16px; }
    .about-box p { color:var(--text-muted); font-size:11px; margin:2px 0; line-height:1.3; }
  </style>
</head>
<body>
  <div id="desktop">
    <div id="desktop-icons">
      <div class="icon" data-app="linux"><div class="icon-img">🐧</div><div class="icon-label">Linux x86</div></div>
      <div class="icon" data-app="browser"><div class="icon-img">🌐</div><div class="icon-label">Browser</div></div>
      <div class="icon" data-app="terminal"><div class="icon-img">💻</div><div class="icon-label">Terminal</div></div>
      <div class="icon" data-app="calc"><div class="icon-img">🧮</div><div class="icon-label">Calc</div></div>
      <div class="icon" data-app="about"><div class="icon-img">⚓</div><div class="icon-label">About</div></div>
    </div>
    
    <div id="start-menu">
      <div class="menu-title">Applications</div>
      <div class="menu-item" data-app="linux">🐧 Linux x86 Emulator</div>
      <div class="menu-item" data-app="browser">🌐 Web Browser</div>
      <div class="menu-item" data-app="terminal">💻 Terminal</div>
      <div class="menu-item" data-app="calc">🧮 Calculator</div>
      <div class="menu-sec"><div class="menu-title">System</div>
        <div class="menu-item" data-app="about">⚓ About</div>
        <div class="menu-item" id="m-restart">🔄 Restart</div>
      </div>
    </div>
    
    <div id="taskbar">
      <button id="start-btn">⚓ Start</button>
      <div id="taskbar-apps"></div>
      <div id="clock">00:00</div>
    </div>
    <div id="window-container"></div>
    <div id="glass-overlay"></div>
  </div>

  <script>
    // CRITICAL: Wrap in try/catch to prevent silent failures
    try {
      console.log('🚢 BoatOS v4.0 Initializing...');
      
      const S = {
        wins: [], z: 100, active: null,
        cont: document.getElementById('window-container'),
        tb: document.getElementById('taskbar-apps'),
        menu: document.getElementById('start-menu'),
        startBtn: document.getElementById('start-btn'),
        glass: document.getElementById('glass-overlay'),
        emulator: null // v86 instance
      };

      // --- UI SETUP ---
      S.startBtn.onclick = e => { e.stopPropagation(); S.menu.classList.toggle('show'); };
      document.onclick = e => { if (!S.menu.contains(e.target) && e.target !== S.startBtn) S.menu.classList.remove('show'); };
      document.querySelectorAll('.menu-item[data-app]').forEach(el => el.onclick = () => { openApp(el.dataset.app); S.menu.classList.remove('show'); });
      document.getElementById('m-restart').onclick = () => { if(confirm('Restart?')) location.reload(); };
      document.querySelectorAll('.icon').forEach(el => el.onclick = () => openApp(el.dataset.app));

      setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}); }, 1000);

      // --- WINDOW MANAGER ---
      function openApp(name) {
        const ex = S.wins.find(w => w.dataset.app === name);
        if (ex) { ex.style.display = 'flex'; focusWin(ex); return; }
        
        const apps = {
          linux: {t:'🐧 Linux x86', c: getLinuxHTML(), w:'700px', h:'500px'},
          browser: {t:'🌐 Browser', c: getBrowserHTML(), w:'800px', h:'500px'},
          terminal: {t:'💻 Terminal', c: getTerminalHTML(), w:'600px', h:'350px'},
          calc: {t:'🧮 Calc', c: getCalcHTML(), w:'240px', h:'320px'},
          about: {t:'⚓ About', c: `<div class="about-box"><h2>🚢 BoatOS v4.0</h2><p>Real x86 Emulation via v86</p><p>Fixes: Inputs, Dragging, Focus</p><p>Click Linux to load an ISO</p></div>`, w:'300px', h:'200px'}
        };
        const app = apps[name]; if(!app) return;
        
        const win = document.createElement('div');
        win.className = 'window'; win.dataset.app = name;
        win.style.left = `${80+(S.wins.length*15)}px`; win.style.top = `${50+(S.wins.length*15)}px`;
        win.style.width = app.w; win.style.height = app.h; win.style.zIndex = ++S.z;
        
        win.innerHTML = `
          <div class="win-header"><span class="win-title">${app.t}</span><div class="win-ctrls"><button class="win-btn min">−</button><button class="win-btn max">□</button><button class="win-btn close">×</button></div></div>
          <div class="win-content">${app.c}</div>
          <div class="resize-handle"></div>`;
        S.cont.appendChild(win); S.wins.push(win);
        
        // Controls
        win.querySelector('.close').onclick = e => { e.stopPropagation(); closeWin(win); };
        win.querySelector('.min').onclick = e => { e.stopPropagation(); win.style.display='none'; };
        win.querySelector('.max').onclick = e => { e.stopPropagation(); toggleMax(win); };
        win.onmousedown = () => focusWin(win);
        win.querySelector('.win-header').onmousedown = e => { if(e.target.closest('.win-btn'))return; startDrag(win,e); };
        win.querySelector('.resize-handle').onmousedown = e => { e.stopPropagation(); startResize(win,e); };
        
        addTBItem(win, app.t); focusWin(win);
        if(name==='linux') initLinux(win);
        if(name==='browser') initBrowser(win);
        if(name==='terminal') initTerminal(win);
        if(name==='calc') initCalc(win);
      }

      function focusWin(win) { S.z++; win.style.zIndex=S.z; S.active=win; document.querySelectorAll('.tb-item').forEach(t=>t.classList.remove('active')); const t=document.querySelector(`.tb-item[data-id="${win.dataset.id}"]`); if(t)t.classList.add('active'); }
      function closeWin(win) { win.remove(); S.wins=S.wins.filter(w=>w!==win); document.querySelector(`.tb-item[data-id="${win.dataset.id}"]`)?.remove(); }
      function toggleMax(win) {
        if(win.dataset.max){win.style.width=win.dataset.ow;win.style.height=win.dataset.oh;win.style.left=win.dataset.ol;win.style.top=win.dataset.ot;delete win.dataset.max;}
        else{win.dataset.ow=win.style.width;win.dataset.oh=win.style.height;win.dataset.ol=win.style.left;win.dataset.ot=win.style.top;win.style.width='calc(100%-20px)';win.style.height='calc(100%-75px)';win.style.left='10px';win.style.top='10px';win.dataset.max='1';}
      }
      function addTBItem(win, t) {
        const id=Math.random().toString(36).substr(2,5); win.dataset.id=id;
        const item=document.createElement('div'); item.className='tb-item active'; item.dataset.id=id; item.textContent=t;
        item.onclick=()=>{if(win.style.display==='none'){win.style.display='flex';focusWin(win);}else if(S.active===win){win.style.display='none';}else focusWin(win);};
        S.tb.appendChild(item);
      }

      // --- DRAG/RESIZE (Fixed) ---
      function startDrag(win,e) {
        e.preventDefault();
        S.glass.style.display='block'; // Glass overlay prevents iframe stealing
        const r=win.getBoundingClientRect(), ox=e.clientX-r.left, oy=e.clientY-r.top;
        const move=ev=>{win.style.left=`${ev.clientX-ox}px`;win.style.top=`${ev.clientY-oy}px`;};
        const up=()=>{S.glass.style.display='none';document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);};
        document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
      }
      function startResize(win,e) {
        e.preventDefault(); S.glass.style.display='block';
        const sx=e.clientX, sy=e.clientY, sw=win.offsetWidth, sh=win.offsetHeight;
        const move=ev=>{win.style.width=`${Math.max(250,sw+ev.clientX-sx)}px`;win.style.height=`${Math.max(150,sh+ev.clientY-sy)}px`;};
        const up=()=>{S.glass.style.display='none';document.removeEventListener('mousemove',move);document.removeEventListener('mouseup',up);};
        document.addEventListener('mousemove',move);document.addEventListener('mouseup',up);
      }

      // --- APP DEFINITIONS ---
      function getBrowserHTML() {
        return `<div class="browser-toolbar"><button class="b-btn" id="b-back" disabled>←</button><input type="text" class="url-bar" id="b-url" placeholder="URL or search..." tabindex="0"><button class="b-btn" id="b-go">➜</button></div><div id="b-content" style="flex:1;display:flex;flex-direction:column"><div class="b-placeholder"><h3>🚢 Browser</h3><div class="q-link" data-url="https://example.com">example.com</div></div></div><div class="status"><span id="b-stat">Ready</span></div>`;
      }
      function initBrowser(w) {
        const url=w.querySelector('#b-url'), go=w.querySelector('#b-go'), con=w.querySelector('#b-content');
        let iframe;
        const load=u=>{if(!u.startsWith('http'))u='https://duckduckgo.com/?q='+encodeURIComponent(u);url.value=u;con.querySelector('.b-placeholder').style.display='none';if(!con.contains(iframe)){iframe=document.createElement('iframe');iframe.className='browser-frame';iframe.sandbox='allow-scripts allow-same-origin allow-forms';con.prepend(iframe);}iframe.src=u;w.querySelector('#b-stat').textContent='Loaded';};
        go.onclick=()=>url.value&&load(url.value); url.onkeydown=e=>e.key==='Enter'&&url.value&&load(url.value);
        // CRITICAL: Stop drag events on input
        url.onmousedown=e=>e.stopPropagation();
        w.querySelectorAll('.q-link').forEach(l=>l.onclick=()=>load(l.dataset.url));
      }

      function getTerminalHTML() { return `<div class="terminal"><div class="t-out" id="t-out">🚢 BoatOS Terminal\n\n$ </div><div class="t-in-line"><span class="t-prompt">$</span><input type="text" class="t-input" id="t-in" tabindex="0"></div></div>`; }
      function initTerminal(w) {
        const out=w.querySelector('#t-out'), inp=w.querySelector('#t-in');
        const run=c=>{out.innerHTML+=`<div><span class="t-prompt">$</span> ${c}</div>`;if(c==='clear')out.innerHTML='';else if(c==='help')out.innerHTML+='<div>help, clear, echo [text], date, reboot</div>';else if(c.startsWith('echo '))out.innerHTML+=`<div>${c.slice(5)}</div>`;else if(c==='date')out.innerHTML+=`<div>${new Date()}</div>`;else if(c!=='')out.innerHTML+=`<div>boatsh: command not found</div>`;out.scrollTop=out.scrollHeight;};
        inp.onkeydown=e=>{if(e.key==='Enter'){run(inp.value);inp.value='';}};
        inp.onmousedown=e=>e.stopPropagation(); w.onclick=()=>inp.focus();
      }

      function getCalcHTML() { return `<div class="calc-grid"><div class="calc-disp" id="c-disp">0</div><button class="calc-btn" data-v="C">C</button><button class="calc-btn op" data-v="/">÷</button><button class="calc-btn op" data-v="*">×</button><button class="calc-btn op" data-v="-">−</button><button class="calc-btn" data-v="7">7</button><button class="calc-btn" data-v="8">8</button><button class="calc-btn" data-v="9">9</button><button class="calc-btn op" data-v="+">+</button><button class="calc-btn" data-v="4">4</button><button class="calc-btn" data-v="5">5</button><button class="calc-btn" data-v="6">6</button><button class="calc-btn" data-v="=" style="grid-row:span 2;background:var(--accent);color:#000">=</button><button class="calc-btn" data-v="1">1</button><button class="calc-btn" data-v="2">2</button><button class="calc-btn" data-v="3">3</button><button class="calc-btn" data-v="0" style="grid-column:span 2">0</button></div>`; }
      function initCalc(w) {
        const d=w.querySelector('#c-disp'); let e='';
        w.querySelectorAll('.calc-btn').forEach(b=>b.onclick=()=>{const v=b.dataset.v;e=(v==='C'?'':v==='='?(()=>{try{return eval(e);}catch{return 'Err';}})():e+v);d.textContent=e||'0';});
      }

      // --- REAL LINUX EMULATOR (v86) ---
      function getLinuxHTML() {
        return `<div class="linux-container">
          <div style="background:#111;padding:6px;border-bottom:1px solid #333;color:#aaa;font-size:10px;display:flex;justify-content:space-between;align-items:center;">
            <span>v86 x86 Emulator</span>
            <button class="linux-btn" id="btn-mount" style="background:var(--success);color:#000;border:none;font-weight:bold;">Load ISO File</button>
          </div>
          <canvas class="linux-canvas" id="em-canvas" width="640" height="400"></canvas>
          <div class="linux-controls" id="term-box" style="display:none;">
            <textarea id="em-term" style="width:100%;height:60px;background:#000;color:#0f0;font-family:monospace;font-size:10px;border:none;padding:4px;resize:none;" readonly></textarea>
          </div>
          <input type="file" id="iso-upload" accept=".iso">
        </div>`;
      }
      function initLinux(w) {
        const btn = w.querySelector('#btn-mount');
        const fileInput = w.querySelector('#iso-upload');
        const canvas = w.querySelector('#em-canvas');
        const term = w.querySelector('#em-term');
        const termBox = w.querySelector('#term-box');
        let emulator;

        btn.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
          const file = e.target.files[0];
          if(!file) return;
          btn.textContent = 'Loading...'; btn.disabled = true;
          
          const reader = new FileReader();
          reader.onload = function(evt) {
            btn.textContent = 'Booting...';
            try {
              // Initialize v86 with the loaded ISO
              // Note: v86 usually requires bios.bin and vgabios.bin loaded from network or local
              // Since we can't embed 20KB BIOS files easily, we rely on the library defaults if available, 
              // or standard CDN fetches. 
              // For this demo, we assume the environment has access to the BIOS or the CDN handles it.
              
              emulator = new V86Starter({
                wasm_path: "https://unpkg.com/v86@0.0.3/build/v86.wasm",
                memory_size: 128 * 1024 * 1024, // 128MB RAM
                vga_memory_size: 8 * 1024 * 1024,
                screen_container: canvas.parentElement, // v86 creates canvas automatically if not specified, but we passed id
                hda: { buffer: evt.target.result },
                bios: { url: "https://unpkg.com/v86@0.0.3/bios/seabios.bin" },
                vga_bios: { url: "https://unpkg.com/v86@0.0.3/bios/vgabios.bin" },
                autostart: true
              });

              emulator.add_listener("screen-set-mode", function() {
                 console.log("Display mode changed");
              });
              
              // Keyboard input forwarding
              document.addEventListener("keydown", function(e) {
                if (S.active === w && document.activeElement !== term) {
                   // If focused on linux window, send keys to emulator
                   // This requires mapping JS keys to PS/2 scan codes, which v86 handles via its internal listener
                   // We simulate focus by attaching the listener to the canvas parent
                }
              });
              
              btn.textContent = 'Running';
              btn.style.background = 'var(--accent)';
              termBox.style.display = 'flex';
              
            } catch (err) {
              btn.textContent = 'Error: ' + err.message;
              console.error(err);
            }
          };
          reader.readAsArrayBuffer(file);
        };
        
        // Allow typing in terminal box if we implement a serial console later
        term.onmousedown = e => e.stopPropagation();
      }

      setTimeout(()=>openApp('about'), 300);
      console.log('✅ BoatOS v4.0 Ready. Linux Emulator Active.');
    } catch(e) {
      console.error('🚨 Fatal Error:', e);
      document.body.innerHTML = `<h1 style="color:red;padding:20px;">System Crash: ${e.message}</h1><pre>${e.stack}</pre>`;
    }
  </script>
</body>
</html>
